<!DOCTYPE html>
<html>
  <head>
    <title>Mi Primera Experiencia WebXR</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/clydedz/aframe-extras@d73d666/dist/aframe-extras.min.js"></script>
  </head>
  <body>
    <a-scene>
      
      <a-box position="-1 0.5 -3" rotation="0 45 0" color="#4CC3D9"></a-box>
      <a-sphere position="0 1.25 -5" radius="1.25" color="#EF2D5E"></a-sphere>
      <a-cylinder position="1 0.75 -3" radius="0.5" height="1.5" color="#FFC65D"></a-cylinder>
      
      <a-plane position="0 0 0" rotation="-90 0 0" width="4" height="4" color="#7BC8A4"></a-plane>
      <a-sky color="#ECECEC"></a-sky>

      <a-entity id="rig" movement-controls="controls: checkpoint, gamepad, keyboard; speed: 0.1">
        
        <a-entity camera position="0 1.6 0" look-controls></a-entity>

        <a-entity tracked-controls="hand: left">
          <a-sphere radius="0.05" color="#888888"></a-sphere>
        </a-entity>

        <a-entity tracked-controls="hand: right">
          <a-sphere radius="0.05" color="#888888"></a-sphere>
        </a-entity>

      </a-entity>
      
    </a-scene>
  </body>
</html>
