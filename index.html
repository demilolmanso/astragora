<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>El Vacío - WebXR Quest 2</title>
  
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.0.0/dist/aframe-extras.min.js"></script>

  <script>
    // 1. Componente personalizado para el sistema de salto
    AFRAME.registerComponent('sistema-salto', {
      schema: {
        fuerzaSalto: { type: 'number', default: 5 },
        gravedad: { type: 'number', default: -9.8 }
      },
      init: function () {
        this.velocidadY = 0;
        this.enElSuelo = true;
        
        this.el.sceneEl.addEventListener('abuttondown', () => this.saltar());
        this.el.sceneEl.addEventListener('xbuttondown', () => this.saltar());
        
        window.addEventListener('keydown', (e) => {
          if (e.code === 'Space') this.saltar();
        });
      },
      saltar: function () {
        if (this.enElSuelo) {
          this.velocidadY = this.data.fuerzaSalto;
          this.enElSuelo = false;
        }
      },
      tick: function (time, timeDelta) {
        if (this.enElSuelo) return;

        const dt = timeDelta / 1000;
        this.velocidadY += this.data.gravedad * dt;
        
        const posicion = this.el.getAttribute('position');
        posicion.y += this.velocidadY * dt;

        if (posicion.y <= 0) {
          posicion.y = 0;
          this.velocidadY = 0;
          this.enElSuelo = true;
        }
        
        this.el.setAttribute('position', posicion);
      }
    });

    // 2. Componente para gestionar la reproducción automática de la música
    AFRAME.registerComponent('gestor-musica', {
      init: function () {
        const entidadAudio = document.querySelector('#audio-ambiente');
        
        // Escucha cuando el usuario entra al modo VR / Pantalla completa
        this.el.addEventListener('enter-vr', () => {
          entidadAudio.components.sound.playSound();
        });

        // Alternativa para PC: si el usuario hace clic en cualquier parte de la pantalla antes de entrar a VR
        window.addEventListener('click', () => {
          entidadAudio.components.sound.playSound();
        }, { once: true }); // El { once: true } asegura que solo salte con el primer clic
      }
    });
  </script>
</head>
<body>

  <a-scene background="color: #050505" gestor-musica>

    <a-assets>
      <audio id="pista-vacio" src="vacio.mp3" preload="auto" crossorigin="anonymous"></audio>
    </a-assets>

    <a-entity id="audio-ambiente" sound="src: #pista-vacio; loop: true; volume: 0.4"></a-entity>

    <a-sky color="#050505"></a-sky>

    <a-plane position="0 0 0" rotation="-90 0 0" width="1000" height="1000" 
             segments-width="250" segments-height="250" 
             material="color: #222222; wireframe: true"></a-plane>
    <a-plane position="0 -0.01 0" rotation="-90 0 0" width="1000" height="1000" 
             material="color: #050505"></a-plane>

    <a-entity id="supernova" position="0 60 -150">
      
      <a-sphere radius="4" 
                material="color: #ffffff; shader: flat"
                animation="property: scale; to: 1.05 1.05 1.05; dir: alternate; dur: 800; loop: true; easing: easeInOutSine">
      </a-sphere>

      <a-sphere radius="4.5" 
                material="color: #00e5ff; shader: flat; transparent: true; opacity: 0.7; blending: additive"
                animation="property: scale; to: 1.4 1.4 1.4; dir: alternate; dur: 2000; loop: true; easing: easeInOutSine">
      </a-sphere>

      <a-sphere radius="5" 
                material="color: #aa00ff; shader: flat; transparent: true; opacity: 0.3; blending: additive"
                animation="property: scale; to: 2.5 2.5 2.5; dir: alternate; dur: 4500; loop: true; easing: easeInOutSine">
      </a-sphere>

      <a-light type="point" 
               color="#00e5ff" 
               intensity="2" 
               distance="300"
               animation="property: intensity; to: 3.5; dir: alternate; dur: 2000; loop: true; easing: easeInOutSine">
      </a-light>

    </a-entity>

    <a-entity id="jugador" 
              movement-controls="speed: 0.15" 
              position="0 0 0" 
              sistema-salto>
      
      <a-entity camera position="0 1.6 0" look-controls="pointerLockEnabled: false"></a-entity>
      <a-entity class="controlador" oculus-touch-controls="hand: left"></a-entity>
      <a-entity class="controlador" oculus-touch-controls="hand: right"></a-entity>

    </a-entity>

  </a-scene>

</body>
</html>
